version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: progresshub_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: progresshub_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: progresshub_backend
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://root:rootpassword@db:3306/progresshub_db
      - JWT_SECRET=progresshub-express-jwt-secret-key-2024
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: progresshub_frontend
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=pulse-ai-secret-key-change-in-production-2024
      - BACKEND_URL=http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
